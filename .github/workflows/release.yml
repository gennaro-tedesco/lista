name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Restore Android signing key
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/lista-release.jks
          printf '%s\n' \
            "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" \
            "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" \
            "storeFile=lista-release.jks" \
            > android/key.properties

      - name: Build APK
        run: |
          flutter build apk --release --target-platform android-arm64 \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }} \
            --dart-define=APP_VERSION=v${{ steps.version.outputs.version }} \
            --dart-define-from-file=config.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/app-release.apk
